{% extends 'base.html' %}
{% block title %}Logged Out{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="brand-logo">
      <i class="bi bi-box-seam-fill"></i>
      <h2>InvenTrack</h2>
    </div>
    <div class="mb-4">
      <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
      <h4 class="mt-3 fw-semibold">You've been logged out</h4>
      <p class="text-muted">Thank you for using InvenTrack.</p>
    </div>
    <a href="{% url 'login' %}" class="btn btn-primary py-2 px-4" style="font-size:.95rem;">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Again
    </a>
  </div>
</div>
{% endblock body %}
